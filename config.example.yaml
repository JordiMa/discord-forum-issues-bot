# Copy to config.yaml and adjust. Maps Discord forums to GitHub repositories
# and defines the status workflow. GitHub is the source of truth.

repositories:
  mobile:
    owner: SentryGuard
    repo: mobile

forums:
  bugs:
    channelId: '000000000000000000' # Discord forum channel ID (right-click > Copy Channel ID)
    repository: mobile
    emoji: '🐛'
    defaultLabels:
      - bug
      - status:new
    project: Mobile Development
  suggestions:
    channelId: '000000000000000000'
    repository: mobile
    emoji: '💡'
    defaultLabels:
      - enhancement
      - status:new

workflow:
  mergedStatus: done # optional: status key applied automatically when a linked PR merges
  statuses:
    new:
      label: status:new
      emoji: '🟡'
      name: 'New'
    confirmed:
      label: status:confirmed
      emoji: '🔵'
    planned:
      label: status:planned
      emoji: '📋'
    progress:
      label: status:in-progress
      emoji: '🔧'
    review:
      label: status:review
      emoji: '👀'
    testing:
      label: status:testing
      emoji: '🧪'
    done:
      label: status:done
      emoji: '✅'
    wontfix:
      label: status:wontfix
      emoji: '❌'
    duplicate:
      label: status:duplicate
      emoji: '🔁'

# Type / category of the ticket: a "Type" menu in Manage + a badge at the top
# of the embed. Optional, and no type is set by default.
types:
  bug: { label: 'type:bug', emoji: '🐛', name: 'Bug' }
  suggestion: { label: 'type:suggestion', emoji: '💡', name: 'Suggestion' }
  question: { label: 'type:question', emoji: '❓', name: 'Question' }

# Moderator actions (select menus on the embed). All optional.
moderation:
  # roleId: '000000000000000000'  # restrict actions to this role; otherwise "Manage Threads" is required
  assignees: # Discord label -> GitHub login (drives the "Assign" menu)
    - name: Jordi
      login: jordimarzo
    - name: Alice
      login: alice
  versions: # drives the "Set version" menu; each must exist as a GitHub milestone
    - '2.5.0'
    - '2.6.0'
    - Backlog

# Comment mirroring between Discord thread replies and GitHub issue comments.
comments:
  discordToGithub: everyone # everyone | maintainers | disabled
  githubToDiscord: all # all | disabled
