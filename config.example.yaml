# Copy to config.yaml and adjust. Maps Discord forums to GitHub repositories
# and defines the status workflow. GitHub is the source of truth.

repositories:
  mobile:
    owner: SentryGuard
    repo: mobile

forums:
  bugs:
    channelId: '000000000000000000' # Discord forum channel ID (right-click > Copy Channel ID)
    repository: mobile
    emoji: '🐛'
    defaultLabels:
      - bug
      - status:triage
    project: Mobile Development
  suggestions:
    channelId: '000000000000000000'
    repository: mobile
    emoji: '💡'
    defaultLabels:
      - enhancement
      - status:triage

workflow:
  statuses:
    triage:
      label: status:triage
      emoji: '🟡'
    confirmed:
      label: status:confirmed
      emoji: '🔵'
    planned:
      label: status:planned
      emoji: '📋'
    progress:
      label: status:in-progress
      emoji: '🔧'
    review:
      label: status:review
      emoji: '👀'
    testing:
      label: status:testing
      emoji: '🧪'
    done:
      label: status:done
      emoji: '✅'
    wontfix:
      label: status:wontfix
      emoji: '❌'
    duplicate:
      label: status:duplicate
      emoji: '🔁'
