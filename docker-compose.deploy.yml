# Deployment (NAS / server): pull the image built by CI instead of building.
# Set BOT_IMAGE in .env, e.g. BOT_IMAGE=ghcr.io/<owner>/discord-forum-issues-bot:latest
services:
  bot:
    image: ${BOT_IMAGE:-ghcr.io/jordima/discord-forum-issues-bot:latest}
    restart: unless-stopped
    env_file: .env
    ports:
      - '${PORT:-3000}:3000'
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - bot-data:/data
    environment:
      DATABASE_URL: 'file:/data/prod.db'

volumes:
  bot-data:
